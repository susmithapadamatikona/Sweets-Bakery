<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#D29B6B">
  <meta name="description" content="Oops — this page crumbled away. Head back home for more freshly baked treats.">
  <meta property="og:title" content="Page Not Found — Sweet Crumbs Bakery">
  <meta property="og:description" content="Oops — this page crumbled away. Head back home for more freshly baked treats.">
  <meta property="og:type" content="website">
  <title>Page Not Found — Sweet Crumbs Bakery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,600;1,700&family=Poppins:wght@300;400;500;600;700&display=swap">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%A7%81%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/aos.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/home.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <a href="#main" class="skip-link">Skip to content</a>

  <!-- Preloader -->
  <div id="preloader">
    <div class="loader">
      <img src="images/logos/stackly-logo.webp" alt="Stackly" class="loader__logo">
      <div class="loader__ring"></div>
      <p class="loader__msg">Loading…</p>
    </div>
  </div>

  <main id="main">
    <section class="section" style="min-height:100vh;display:grid;place-items:center;text-align:center">
      <div class="container" style="max-width:600px">
        <div style="font-size:120px;line-height:1" data-reveal="zoom">🧁</div>
        <h1 style="font-size:clamp(60px,12vw,120px);color:var(--primary);line-height:1" data-reveal="up">404</h1>
        <h2 class="section-title" data-reveal="up" data-delay="1">Oops! This page crumbled away</h2>
        <p class="section-sub" style="margin:0 auto" data-reveal="up" data-delay="2">The page you're looking for got eaten. But don't worry — there are plenty more treats where that came from.</p>
        <div class="hero__cta" style="justify-content:center;margin-top:26px" data-reveal="up" data-delay="3">
          <a href="index.html" class="btn btn--primary btn--lg">Back to Home</a>
          <button type="button" onclick="history.back()" class="btn btn--outline btn--lg">Go Back</button>
        </div>
      </div>
    </section>
  </main>

  <script src="js/main.js"></script>
  <script src="js/aos.js"></script>
  <script src="js/animations.js"></script>
</body>
</html>
